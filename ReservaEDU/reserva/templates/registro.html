{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    {% include 'pwa_meta.html' %}
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registro - ReservaEDU | La Dolorosa</title>
    <link rel="icon" type="image/png" href="{% static 'images/escudo_dolorosa.jpg' %}" />
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@700;800;900&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#1e40af', 'primary-dark': '#1e3a8a', accent: '#D97706' },
                    fontFamily: { display: ['Manrope','sans-serif'], body: ['Inter','sans-serif'] }
                }
            }
        }
    </script>
    <style>
        * { font-family: 'Inter', sans-serif; }
        html { zoom: 100%; }
        body { font-family: 'Inter', sans-serif; }
        h1,h2,h3 { font-family: 'Manrope', sans-serif; }
        .material-symbols-outlined { font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24; }
        
        /* Premium Gold & Silk Theme */
        .glass-card { 
            background: rgba(15, 23, 42, 0.55); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px); 
            border: 1.5px solid rgba(212, 175, 55, 0.35); 
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), 0 0 50px rgba(30, 64, 175, 0.25), inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }
        
        .text-gold-gradient {
            background: linear-gradient(135deg, #ffe082 0%, #d4af37 50%, #aa7c11 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0px 2px 4px rgba(0, 0, 0, 0.4));
        }

        /* Django form styling overrides to match the premium inputs of login page */
        form p { margin-bottom: 1.25rem; display: flex; flex-direction: column; gap: 0.375rem; }
        form label { font-size: 0.7rem; font-weight: 700; color: #ffe082; text-transform: uppercase; letter-spacing: 0.1em; }
        form input[type="text"], form input[type="password"], form input[type="email"] {
            width: 100%; padding: 0.875rem 1rem;
            background: rgba(255, 255, 255, 0.03) !important;
            border: 1px solid rgba(212, 175, 55, 0.2) !important;
            border-radius: 0.75rem; color: white; font-size: 0.875rem; outline: none; transition: all 0.3s;
        }
        form input:focus { 
            background: rgba(255, 255, 255, 0.08) !important; 
            border-color: #d4af37 !important; 
            box-shadow: 0 0 12px rgba(212, 175, 55, 0.25) !important; 
        }
        form input::placeholder { color: rgba(255, 255, 255, 0.25); }
        .helptext { font-size: 0.7rem; color: rgba(226, 232, 240, 0.5); margin-top: 0.25rem; line-height: 1.4; }
        ul.errorlist { color: #fca5a5; font-size: 0.7rem; font-weight: 700; list-style: none; padding: 0; margin: 0.25rem 0; }
        
        @keyframes fadeUp { from { opacity:0; transform:translateY(15px); } to { opacity:1; transform:translateY(0); } }
        .fade-up { animation: fadeUp 0.4s ease forwards; }
    </style>
</head>
<body class="min-h-screen relative flex items-center justify-center p-6 overflow-x-hidden bg-[#0f172a]">
    <!-- Full-screen Background with image and overlay -->
    <div class="absolute inset-0 z-0" style="
        background-image: url('{% static 'images/iglesia_dolorosa.jpg' %}');
        background-size: cover;
        background-position: center 30%;
        background-repeat: no-repeat;
        image-rendering: high-quality;
        -webkit-backface-visibility: hidden;
        backface-visibility: hidden;
        transform: translateZ(0);
        will-change: transform;
    "></div>
    <div class="absolute inset-0 z-0 bg-black/45 backdrop-blur-[3px]"></div>

    <!-- Centered Card -->
    <div class="relative z-10 w-full max-w-md glass-card rounded-[2.5rem] p-10 pt-20 shadow-2xl fade-up my-8 border-2 border-[#d4af37]/30 mt-8">
        <!-- Circular Gold Medallion Logo (overlapping the top border) -->
        <img src="{% static 'images/escudo_dolorosa.jpg' %}" alt="Escudo UEF La Dolorosa" class="absolute -top-16 left-1/2 -translate-x-1/2 h-32 w-auto object-contain drop-shadow-[0_4px_15px_rgba(212,175,55,0.45)] z-20">

        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-black text-gold-gradient" style="font-family:'Manrope',sans-serif;">Crear Cuenta</h1>
            <p class="text-[#ffe082]/70 text-xs mt-1">Únete a la plataforma de La Dolorosa</p>
        </div>
 
        <form method="post" action="{% url 'registro' %}">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="w-full bg-[#d4af37] hover:bg-[#ffe082] text-[#0f172a] font-black py-4 rounded-xl transition-all duration-200 hover:-translate-y-0.5 hover:shadow-lg hover:shadow-[#d4af37]/30 text-xs uppercase tracking-widest mt-6" style="font-family:'Manrope',sans-serif;">
                Registrarse
            </button>
        </form>
 
        <div class="mt-8 text-center border-t border-white/10 pt-6">
            <p class="text-slate-300 text-sm">¿Ya tienes cuenta? <a href="{% url 'login' %}" class="text-[#ffe082] hover:text-[#d4af37] font-bold hover:underline transition-colors">Inicia sesión</a></p>
        </div>
    </div>

    <!-- Premium Footer with copyright and social links -->
    <footer class="absolute bottom-6 left-0 right-0 z-10 text-center flex flex-col items-center gap-3">
        <p class="text-[10px] font-bold text-[#d4af37]/80 uppercase tracking-widest">© 2028 U.E.F. La Dolorosa - Loja. Todos los derechos reservados.</p>
        <div class="flex gap-5 items-center">
            <!-- Facebook SVG Icon -->
            <a href="#" class="text-[#d4af37]/70 hover:text-[#d4af37] hover:scale-110 transition-all">
                <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M22 12c0-5.52-4.48-10-10-10S2 6.48 2 12c0 4.84 3.44 8.87 8 9.8V15H8v-3h2V9.5C10 7.57 11.57 6 13.5 6H16v3h-2c-.55 0-1 .45-1 1v2h3v3h-3v6.95c4.56-.93 8-4.96 8-9.75z"/>
                </svg>
            </a>
            <!-- X SVG Icon -->
            <a href="#" class="text-[#d4af37]/70 hover:text-[#d4af37] hover:scale-110 transition-all">
                <svg class="w-4.5 h-4" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
                </svg>
            </a>
            <!-- YouTube SVG Icon -->
            <a href="#" class="text-[#d4af37]/70 hover:text-[#d4af37] hover:scale-110 transition-all">
                <svg class="w-4.5 h-4.5" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M23.498 6.163a3.003 3.003 0 0 0-2.11-2.11C19.518 3.5 12 3.5 12 3.5s-7.518 0-9.388.553a3.003 3.003 0 0 0-2.11 2.11C0 8.033 0 12 0 12s0 3.967.502 5.837a3.003 3.003 0 0 0 2.11 2.11c1.87.553 9.388.553 9.388.553s7.518 0 9.388-.553a3.003 3.003 0 0 0 2.11-2.11C24 15.967 24 12 24 12s0-3.967-.502-5.837zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/>
                </svg>
            </a>
        </div>
    </footer>
    
    <!-- Premium Sparkle/Star in the bottom right -->
    <div class="absolute bottom-28 right-20 z-0 pointer-events-none opacity-60 animate-pulse hidden lg:block">
        <svg class="w-12 h-12 text-[#ffe082]/70 drop-shadow-[0_0_8px_rgba(212,175,55,0.5)]" fill="currentColor" viewBox="0 0 24 24">
            <path d="M12 0l3 9 9 3-9 3-3 9-3-9-9-3 9-3z"/>
        </svg>
    </div>
</body>
</html>
